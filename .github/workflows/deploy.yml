# QSpot Website — GitHub Pages Deployment
# Place at: .github/workflows/deploy.yml in the qspot-connect repo
#
# This workflow:
#   1. Injects the MapTiler API key from GitHub Secrets (never committed to source)
#   2. Injects the Supabase anon key + Stripe publishable key into web/config.js
#   3. Merges website/ files with existing Stripe + .well-known + web/ paths
#   4. Deploys to GitHub Pages
#
# SETUP REQUIRED (one-time):
#   1. In MapTiler dashboard: restrict key to your domain (see SETUP_GUIDE.md)
#   2. In GitHub repo: Settings → Secrets and variables → Actions → New repository secret
#      Name: MAPTILER_API_KEY        Value: <your MapTiler key>
#      Name: SUPABASE_ANON_KEY       Value: <same value as SUPABASE_ANON_KEY in secrets.properties>
#      Name: STRIPE_PUBLISHABLE_KEY  Value: <pk_test_... now; pk_live_... at launch>
#   3. In GitHub repo: Settings → Pages → Source → GitHub Actions

name: Deploy QSpot Website

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual trigger from GitHub Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false   # Don't cancel in-flight deploys

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Inject the MapTiler API key from GitHub Secrets into config.js
      # The source file always contains the placeholder — the real key NEVER
      # touches the repository. It only exists in the built artifact.
      # -----------------------------------------------------------------------
      - name: Inject MapTiler API key
        env:
          MAPTILER_KEY: ${{ secrets.MAPTILER_API_KEY }}
        run: |
          # Strip any accidental whitespace/newlines from the secret value
          CLEAN_KEY=$(printf '%s' "$MAPTILER_KEY" | tr -d '[:space:]')
          if [ -z "$CLEAN_KEY" ]; then
            echo "::warning::MAPTILER_API_KEY secret is not set. Map tiles will not load."
          else
            echo "::notice::MAPTILER_API_KEY found, injecting into config.js"
          fi
          # Use | as delimiter to avoid conflicts if key ever contains /
          sed -i "s|YOUR_MAPTILER_API_KEY_HERE|${CLEAN_KEY}|g" website/js/config.js

      # -----------------------------------------------------------------------
      # Inject the Supabase anon key + Stripe publishable key into web/config.js
      # (QSpot Premium subscription pages). Same pattern as the MapTiler step:
      # the repo keeps placeholders; real values exist only in the built artifact.
      # Both values are public-by-design (anon key is the public client key
      # protected by RLS; pk_ keys are publishable) — Secrets are used purely
      # for consistency and so key rotation never requires a code commit.
      # -----------------------------------------------------------------------
      - name: Inject web subscription keys
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          CLEAN_ANON=$(printf '%s' "$SUPABASE_ANON_KEY" | tr -d '[:space:]')
          CLEAN_PK=$(printf '%s' "$STRIPE_PUBLISHABLE_KEY" | tr -d '[:space:]')

          if [ -z "$CLEAN_ANON" ]; then
            echo "::warning::SUPABASE_ANON_KEY secret is not set. Login on /web/ pages will not work."
          else
            echo "::notice::SUPABASE_ANON_KEY found, injecting into web/config.js"
          fi
          if [ -z "$CLEAN_PK" ]; then
            echo "::warning::STRIPE_PUBLISHABLE_KEY secret is not set. Card update on /web/account.html will not work."
          else
            echo "::notice::STRIPE_PUBLISHABLE_KEY found, injecting into web/config.js"
          fi

          sed -i "s|PASTE_YOUR_SUPABASE_ANON_KEY_HERE|${CLEAN_ANON}|g" web/config.js
          sed -i "s|PASTE_YOUR_STRIPE_PUBLISHABLE_KEY_HERE|${CLEAN_PK}|g" web/config.js

      # -----------------------------------------------------------------------
      # Build the _site directory:
      #   - Website files at root (index.html, map.html, about.html, css/, js/)
      #   - .well-known/ preserved at root (Android App Links / assetlinks.json)
      #   - stripe/ preserved at root (Stripe payment redirect pages)
      #   - web/ preserved at root (QSpot Premium subscription pages → /web/)
      #   - .nojekyll tells GitHub Pages not to process with Jekyll
      # -----------------------------------------------------------------------
      - name: Assemble site
        run: |
          mkdir -p _site

          # Copy website pages and assets to site root
          cp -r website/. _site/

          # Preserve .well-known (Android App Links — must be at root)
          if [ -d ".well-known" ]; then
            cp -r .well-known _site/
            echo "✓ Copied .well-known/"
          fi

          # Preserve Stripe redirect pages (must stay at /stripe/)
          if [ -d "stripe" ]; then
            cp -r stripe _site/
            echo "✓ Copied stripe/"
          fi

          # Preserve QSpot Premium subscription pages (served at /web/)
          if [ -d "web" ]; then
            cp -r web _site/
            echo "✓ Copied web/"
          fi

          # Ensure Jekyll is disabled (important for files starting with _)
          touch _site/.nojekyll

          echo "--- Site contents ---"
          ls -la _site/
          echo "--- /web contents ---"
          ls -la _site/web/ || true

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
