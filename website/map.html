<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map — QSpot</title>
    <meta name="description" content="Explore live QSpot listings on an interactive map. See what's available near you.">
    <meta name="theme-color" content="#6200EE" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#1c1c2a" media="(prefers-color-scheme: dark)">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://qspot.app/map.html">

    <!-- Open Graph -->
    <meta property="og:title" content="Live Map — QSpot">
    <meta property="og:description" content="Explore live QSpot listings on an interactive map. See what's available near you.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="QSpot">
    <meta property="og:url" content="https://qspot.app/map.html">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Live Map — QSpot">
    <meta name="twitter:description" content="Explore live QSpot listings on an interactive map. See what's available near you.">
    <meta name="twitter:site" content="@qspotapp">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236200EE'/><text x='50' y='68' font-size='55' font-weight='bold' text-anchor='middle' fill='white'>Q</text></svg>">

    <!-- MapLibre GL CSS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-map">

    <!-- Skip to content for keyboard users -->
    <a href="#map" class="skip-to-content">Skip to map</a>

    <!-- Navigation -->
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon" aria-hidden="true">Q</div>
                QSpot
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="map.html">Live Map</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="index.html#download" class="nav-cta">Get the App</a></li>
            </ul>
            <button class="dark-mode-toggle" id="dark-mode-toggle" aria-label="Switch to dark mode" title="Toggle dark mode">
                <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <div class="nav-toggle" aria-label="Toggle menu" aria-expanded="false" role="button" tabindex="0">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>

    <!-- Map Page -->
    <main class="map-page">
        <div class="map-toolbar">
            <h2>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#6200EE" stroke-width="2" style="vertical-align:middle;margin-right:6px;" aria-hidden="true"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 8 12 8 12s8-6.6 8-12a8 8 0 0 0-8-8z"/></svg>
                Live Spots
            </h2>
            <span class="spot-count" id="spot-count" aria-live="polite">Loading...</span>
        </div>
        <div class="map-container">
            <div id="map" role="application" aria-label="Map showing QSpot listings"></div>
            <div class="map-loading" id="map-loading" aria-live="polite">
                <div class="spinner" aria-hidden="true"></div>
                <span>Loading spots...</span>
            </div>
        </div>
    </main>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
